<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchases — Shop Management System</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="content">
      <div class="page-header">
        <div>
          <span class="eyebrow">Transactions</span>
          <h1>Purchases</h1>
          <p>Record stock coming in from a supplier. Stock updates the moment a purchase is saved.</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>New Purchase</h2></div>

        <div id="purchase-form-alert"></div>

        <form id="purchase-form" novalidate>
          <div class="invoice-header-fields">
            <div class="field">
              <label for="purchase-supplier">Supplier</label>
              <select id="purchase-supplier" required>
                <option value="">Select a supplier…</option>
              </select>
            </div>
          </div>

          <table class="line-items-table">
            <thead>
              <tr>
                <th style="width:42%;">Product</th>
                <th style="width:14%;">Qty</th>
                <th style="width:18%;">Unit cost</th>
                <th style="width:18%;">Subtotal</th>
                <th style="width:1%;"></th>
              </tr>
            </thead>
            <tbody id="line-items-body"></tbody>
          </table>

          <button type="button" class="btn btn-secondary btn-sm add-row-btn" id="add-line-btn">+ Add line</button>

          <div class="totals-bar">
            <span class="totals-label">Total</span>
            <span class="totals-value money" id="purchase-total">0.00</span>
          </div>

          <div class="invoice-actions">
            <button type="submit" class="btn btn-primary" id="purchase-submit-btn">Record Purchase</button>
          </div>
        </form>
      </div>

      <div class="card">
        <div class="card-header"><h2>Purchase History</h2></div>

        <div class="toolbar">
          <div class="flex gap-8" style="flex-wrap:wrap; align-items:center;">
            <select class="filter-select" id="filter-supplier">
              <option value="">All suppliers</option>
            </select>
            <label class="filter-checkbox">From
              <input type="date" class="filter-select" id="filter-from" style="width:auto;" />
            </label>
            <label class="filter-checkbox">To
              <input type="date" class="filter-select" id="filter-to" style="width:auto;" />
            </label>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Supplier</th>
                <th>Recorded by</th>
                <th>Date</th>
                <th>Total</th>
                <th style="width:1%;">Actions</th>
              </tr>
            </thead>
            <tbody id="history-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/purchases.js"></script>
</body>
</html>
