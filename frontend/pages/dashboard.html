<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Shop Management System</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="content">
      <div class="page-header">
        <div>
          <span class="eyebrow">Overview</span>
          <h1 id="welcome-heading">Welcome</h1>
          <p>Here's where things stand today.</p>
        </div>
      </div>

      <div id="low-stock-banner"></div>

      <div class="stat-grid" id="stat-grid">
        <div class="stat-ticket">
          <div class="label">Products</div>
          <div class="value skeleton-num">—</div>
        </div>
        <div class="stat-ticket">
          <div class="label">Categories</div>
          <div class="value skeleton-num">—</div>
        </div>
        <div class="stat-ticket">
          <div class="label">Customers</div>
          <div class="value skeleton-num">—</div>
        </div>
        <div class="stat-ticket">
          <div class="label">Low stock</div>
          <div class="value skeleton-num">—</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Modules</h2>
        </div>
        <div class="module-grid" id="module-grid"></div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
